name: Build, Package, and Publish Extension

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Zip Utility
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build Chrome MV3 Package
        run: |
          make chrome
          zip -r cache-flux-manifest-v3.zip manifest.json background.js options.html options.js icons README.md LICENSE

      - name: Build Firefox MV2 Package
        run: |
          make firefox
          zip -r cache-flux-manifest-v2.zip manifest.json background.js options.html options.js icons README.md LICENSE

      - name: Upload Chrome MV3 Artifact (Workflow Run)
        uses: actions/upload-artifact@v4
        with:
          name: cache-flux-manifest-v3
          path: cache-flux-manifest-v3.zip

      - name: Upload Firefox MV2 Artifact (Workflow Run)
        uses: actions/upload-artifact@v4
        with:
          name: cache-flux-manifest-v2
          path: cache-flux-manifest-v2.zip

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Packaged Zips
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      # ----------------------------------------------------------------------
      # GitHub Release Creation
      # ----------------------------------------------------------------------
      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cache-flux-manifest-v3.zip
            cache-flux-manifest-v2.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
